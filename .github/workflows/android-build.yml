name: Android Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Checkout submodules
        run: |
          git submodule update --init --recursive

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: setup android sdk
        uses: android-actions/setup-android@v3

      - name: install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;26.1.10909125" # Tauri v2 recommended NDK version or similar
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: install frontend dependencies
        run: npm install

      - name: build android
        run: npm run tauri android build -- --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-aarch64-release
          path: src-tauri/gen/android/app/build/outputs/apk/*/release/*.apk

      - name: release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/*/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
